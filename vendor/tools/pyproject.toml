[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "tools"
version = "1.0.0"
description = "Handy tool set for everyday Python programming"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "aiohttp",
    "numpy",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "pytest-timeout>=2.0.0",
    "mypy>=1.0.0",
]

[tool.setuptools]
package-dir = { "tools" = "src" }
packages = [
    "tools",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
timeout = 360