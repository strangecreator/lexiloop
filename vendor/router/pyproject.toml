[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "router"
version = "1.0.0"
description = "Router for fast and handy access to LLMs and other models"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "requests",
    "aiohttp",
    "tools>=1.0.0",
    "python-dotenv>=1.0.0",
    "redis>=5.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "pytest-asyncio>=1.3.0",
    "pytest-timeout>=2.0.0",
    "mypy>=1.0.0",
]

[tool.setuptools]
package-dir = { "router" = "src" }
packages = [
    "router",
    "router.llm",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
timeout = 360